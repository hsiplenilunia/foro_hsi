# ============================================================
#  netlify.toml — foro.hospitalsininfecciones.com
#  Configuración de build, redirects y headers de seguridad
# ============================================================


# ------------------------------------------------------------
# HEADERS DE SEGURIDAD — aplicados a todas las rutas
# ------------------------------------------------------------
[[headers]]
  for = "/*"

  [headers.values]

    # ── Transporte seguro ──────────────────────────────────
    # Fuerza HTTPS por 1 año, incluyendo subdominios.
    # PRECAUCIÓN: activa preload solo después de verificar
    # en https://hstspreload.org que todo corre en HTTPS.
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"

    # ── Clickjacking ───────────────────────────────────────
    # Impide que el sitio sea embebido en iframes externos.
    X-Frame-Options = "DENY"

    # ── MIME sniffing ──────────────────────────────────────
    # Evita que el navegador "adivine" el tipo de contenido.
    X-Content-Type-Options = "nosniff"

    # ── Referrer ───────────────────────────────────────────
    # Envía el origen solo en requests al mismo dominio;
    # en cross-origin solo envía el esquema+host, sin path.
    Referrer-Policy = "strict-origin-when-cross-origin"

    # ── Permisos de APIs del navegador ────────────────────
    # Deshabilita APIs que este sitio no necesita.
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=(), usb=(), bluetooth=(), accelerometer=(), gyroscope=(), magnetometer=()"

    # ── XSS Protection (legacy) ───────────────────────────
    # Para navegadores antiguos que no entienden CSP.
    X-XSS-Protection = "1; mode=block"

    # ── Content Security Policy ───────────────────────────
    # La política más importante. Controla exactamente qué
    # recursos puede cargar la página y desde dónde.
    #
    # Detalle de cada directiva:
    #
    #  default-src     → origen propio por defecto
    #  script-src      → JS: solo propio + inline necesario para Astro
    #                    (quita 'unsafe-inline' si migras a nonces)
    #  style-src       → CSS: propio + inline de Astro
    #  img-src         → imágenes propias + Cloudinary (ambas cuentas)
    #                    + data: para SVGs inline
    #  font-src        → fuentes propias
    #  connect-src     → fetch/XHR: propio + Cloudinary
    #  media-src       → audio/video: YouTube embed
    #  frame-src       → iframes: YouTube (para el playlist embebido)
    #  object-src      → deshabilitar plugins (Flash, etc.)
    #  base-uri        → evita ataques de base tag injection
    #  form-action     → formularios solo al propio dominio
    #  upgrade-insecure-requests → fuerza HTTPS en sub-recursos
    #
    Content-Security-Policy = """
      default-src 'self';
      script-src 'self' 'unsafe-inline';
      style-src 'self' 'unsafe-inline';
      img-src 'self' data:
        https://res.cloudinary.com/dokvwbz1c
        https://res.cloudinary.com/difrqz0ke;
      font-src 'self';
      connect-src 'self'
        https://res.cloudinary.com;
      media-src 'self'
        https://www.youtube.com
        https://youtu.be;
      frame-src
        https://www.youtube.com
        https://youtu.be;
      object-src 'none';
      base-uri 'self';
      form-action 'self';
      upgrade-insecure-requests;
    """

    # ── Cross-Origin policies ──────────────────────────────
    # Aisla el contexto de navegación del sitio.
    Cross-Origin-Opener-Policy   = "same-origin"
    Cross-Origin-Embedder-Policy = "require-corp"
    Cross-Origin-Resource-Policy = "same-site"

# ------------------------------------------------------------
# CACHE — assets con hash de Astro (inmutables)
# Astro genera nombres con hash en _astro/, por lo que
# se pueden cachear indefinidamente de forma segura.
# ------------------------------------------------------------
[[headers]]
  for = "/_astro/*"

  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ------------------------------------------------------------
# CACHE — imágenes y fuentes propias
# ------------------------------------------------------------
[[headers]]
  for = "/img/*"

  [headers.values]
    Cache-Control = "public, max-age=2592000"   # 30 días

[[headers]]
  for = "/fonts/*"

  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ------------------------------------------------------------
# CACHE — SVGs y otros estáticos en raíz
# ------------------------------------------------------------
[[headers]]
  for = "/*.svg"

  [headers.values]
    Cache-Control = "public, max-age=86400"     # 1 día

# ------------------------------------------------------------
# SEGURIDAD — deshabilitar acceso a archivos sensibles
# (por si en algún momento terminan en /dist por error)
# ------------------------------------------------------------
[[headers]]
  for = "/.env"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

[[headers]]
  for = "/netlify.toml"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"
